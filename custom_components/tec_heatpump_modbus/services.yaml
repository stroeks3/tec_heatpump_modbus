write_register:
  name: Write Register
  description: Write a value to a writable TEC heat pump sensor register
  fields:
    sensor:
      name: Sensor
      description: The sensor unique ID to write to
      required: true
      example: "st01"
      selector:
        select:
          options:
            - "st01"
            - "st02"
            - "st03"
            - "st04"
            - "st06"
            - "st07"
            - "st08"
            - "st09"
            - "st10"
            - "st11"
            - "st12"
            - "st13"
            - "st14"
            - "st15"
            - "st16"
            - "st17"
            - "st18"
            - "st33"
            - "st34"
            - "room_temperature_setting"
            - "cm14"
            - "cm15"
            - "cm16"
            - "cm17"
            - "cm18"
            - "ev03"
            - "ev04"
            - "ev05"
            - "ev06"
            - "ev07"
    value:
      name: Value
      description: The value to write (will be automatically scaled according to sensor configuration)
      required: true
      example: 25.5
      selector:
        number:
          min: -100
          max: 800
          step: 0.1